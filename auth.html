<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Корочки.есть</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">Корочки.<span>есть</span></a>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="auth.html" class="active">Войти</a>
                <a href="register.html">Регистрация</a>
            </nav>
        </div>
    </header>
    <main class="main" style="display:flex;justify-content:center;align-items:center;">
        <div class="auth-card">
            <h1>Вход</h1>
            <p class="subtitle">Авторизация</p>
            <div id="authError" class="alert alert-danger" style="display:none;"></div>
            <div id="authSuccess" class="alert alert-success" style="display:none;"></div>
            <form id="authForm" onsubmit="return handleAuth(event)">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="authLogin" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="authPass" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>
            <div class="text-center mt-3">
                <a href="register.html" class="link">Еще не зарегистрированы? Регистрация</a>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
