<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Корочки.есть</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">Корочки.<span>есть</span></a>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="auth.html">Войти</a>
                <a href="register.html" class="active">Регистрация</a>
            </nav>
        </div>
    </header>
    <main class="main" style="display:flex;justify-content:center;align-items:center;">
        <div class="auth-card">
            <h1>Регистрация</h1>
            <p class="subtitle">Создайте аккаунт</p>
            <div id="regError" class="alert alert-danger" style="display:none;"></div>
            <div id="regSuccess" class="alert alert-success" style="display:none;"></div>
            <form id="regForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="example@mail.ru" required>
                </div>
                <div class="form-group">
                    <label>Логин (латиница и цифры, не менее 6 символов)</label>
                    <input type="text" id="regLogin" placeholder="Придумайте логин" required>
                    <div class="hint">Только латиница и цифры, не менее 6 символов</div>
                </div>
                <div class="form-group">
                    <label>Пароль (минимум 8 символов)</label>
                    <input type="password" id="regPass" placeholder="Придумайте пароль" required>
                    <div class="hint">Не менее 8 символов</div>
                </div>
                <div class="form-group">
                    <label>ФИО (кириллица)</label>
                    <input type="text" id="regFio" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="form-group">
                    <label>Телефон 8(XXX)XXX-XX-XX</label>
                    <input type="text" id="regTel" placeholder="8(912)345-67-89" required>
                    <div class="hint">Формат: 8(XXX)XXX-XX-XX</div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
            </form>
            <div class="text-center mt-3">
                <a href="auth.html" class="link">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
